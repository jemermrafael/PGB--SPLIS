worker_processes auto;
error_log /dev/stderr warn;
# Coolify blocks pwrite to mounted volumes from nginx; not needed with daemon off + supervisord
pid /dev/null;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    client_body_temp_path /var/www/html/storage/nginx/client_body;
    proxy_temp_path /var/www/html/storage/nginx/proxy;
    fastcgi_temp_path /var/www/html/storage/nginx/fastcgi;
    uwsgi_temp_path /var/www/html/storage/nginx/uwsgi;
    scgi_temp_path /var/www/html/storage/nginx/scgi;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 210M;

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        charset utf-8;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 300;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
