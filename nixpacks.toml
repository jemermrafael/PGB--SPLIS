# Coolify: Build Pack = Nixpacks. Mount storage at /app/storage, port 80.
# Uses Ubuntu PHP 8.4 (apt) at runtime for MySQL 8.4 caching_sha2_password support.

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["...", "python311Packages.supervisor"]

[phases.build]
cmds = [
    "chmod +x /assets/install-apt-php.sh",
    "/assets/install-apt-php.sh",
    "mkdir -p /etc/supervisor/conf.d/",
    "cp /assets/worker-*.conf /etc/supervisor/conf.d/",
    "cp /assets/supervisord.conf /etc/supervisord.conf",
    "chmod +x /assets/start.sh",
    "mkdir -p storage/app/public storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs",
    "chmod -R 775 storage || true",
    "test -f public/build/manifest.json || (echo 'ERROR: Vite build did not produce public/build/manifest.json' && exit 1)",
    "..."
]

[start]
cmd = "/assets/start.sh"

[staticAssets]
"install-apt-php.sh" = '''
#!/bin/bash
set -euo pipefail

export DEBIAN_FRONTEND=noninteractive

if command -v php8.4 >/dev/null 2>&1; then
  echo "PHP 8.4 already installed."
else
  echo "Installing PHP 8.4 from apt (mysqlnd for MySQL 8.4)..."
  apt-get update
  apt-get install -y ca-certificates curl gnupg software-properties-common

  if ! apt-cache show php8.4-cli >/dev/null 2>&1; then
    install -d -m 0755 /etc/apt/keyrings
    curl -fsSL https://packages.sury.org/php/apt.gpg -o /etc/apt/keyrings/php.gpg
    echo "deb [signed-by=/etc/apt/keyrings/php.gpg] https://packages.sury.org/php/ $(. /etc/os-release && echo ${VERSION_CODENAME}) main" > /etc/apt/sources.list.d/php.list
    apt-get update
  fi

  apt-get install -y \
    php8.4-cli php8.4-fpm php8.4-mysql php8.4-mbstring php8.4-xml \
    php8.4-curl php8.4-zip php8.4-gd php8.4-bcmath php8.4-intl \
    php8.4-opcache php8.4-tokenizer
fi

PHP_FPM_POOL=/etc/php/8.4/fpm/pool.d/www.conf
if [ -f "$PHP_FPM_POOL" ]; then
  sed -i 's|^listen = .*|listen = 127.0.0.1:9000|' "$PHP_FPM_POOL"
  grep -q '^clear_env = no' "$PHP_FPM_POOL" || echo 'clear_env = no' >> "$PHP_FPM_POOL"
fi

cat > /etc/php/8.4/fpm/conf.d/99-uploads.ini <<'EOF'
upload_max_filesize = 200M
post_max_size = 210M
memory_limit = 256M
max_execution_time = 300
EOF

cp /etc/php/8.4/fpm/conf.d/99-uploads.ini /etc/php/8.4/cli/conf.d/99-uploads.ini

php8.4 -m | grep -qi pdo_mysql || (echo "ERROR: php8.4-mysql (pdo_mysql) not loaded" && exit 1)
echo "PHP 8.4 apt install OK: $(php8.4 -v | head -1)"
'''

"start.sh" = '''
#!/bin/bash
set -e
cd /app

PHP="${PHP_BIN:-/usr/bin/php8.4}"
if [ ! -x "$PHP" ]; then
  PHP=php
fi

mkdir -p storage/app/public storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
chmod -R 775 storage bootstrap/cache || true

if [ -z "$APP_KEY" ]; then
  echo "ERROR: APP_KEY is not set in Coolify environment variables."
  exit 1
fi

if [ ! -f public/build/manifest.json ]; then
  echo "ERROR: public/build/manifest.json is missing. Frontend assets were not built."
  exit 1
fi

if [ -n "$DB_HOST" ] && [ "$DB_CONNECTION" = "mysql" ]; then
  echo "Waiting for MySQL at ${DB_HOST}:${DB_PORT:-3306}..."
  for i in $(seq 1 30); do
    if (echo > /dev/tcp/"$DB_HOST"/"${DB_PORT:-3306}") 2>/dev/null; then
      echo "MySQL port is open."
      break
    fi
    if [ "$i" -eq 30 ]; then
      echo "ERROR: MySQL not reachable at ${DB_HOST}:${DB_PORT:-3306}"
      exit 1
    fi
    sleep 2
  done
fi

$PHP artisan package:discover --ansi --no-interaction
$PHP artisan optimize:clear --no-interaction
$PHP artisan storage:link --force 2>/dev/null || true

echo "Running migrations (PHP: $($PHP -v | head -1))..."
if ! $PHP artisan migrate --force --no-interaction; then
  echo "ERROR: Migrations failed. Verify DB_USERNAME, DB_PASSWORD, and that database ${DB_DATABASE} exists."
  exit 1
fi

if [ "$APP_ENV" = "production" ]; then
  $PHP artisan config:cache --no-interaction
  $PHP artisan route:cache --no-interaction
  $PHP artisan view:cache --no-interaction
fi

node /assets/scripts/prestart.mjs /assets/nginx.template.conf /etc/nginx.conf
exec supervisord -c /etc/supervisord.conf -n
'''

"supervisord.conf" = '''
[unix_http_server]
file=/assets/supervisor.sock

[supervisord]
logfile=/dev/null
logfile_maxbytes=0
pidfile=/assets/supervisord.pid
nodaemon=false
silent=false

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///assets/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

"worker-nginx.conf" = '''
[program:worker-nginx]
process_name=%(program_name)s
command=nginx -c /etc/nginx.conf
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
'''

"worker-phpfpm.conf" = '''
[program:worker-phpfpm]
process_name=%(program_name)s
command=/usr/sbin/php-fpm8.4 -F
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
'''

"php-fpm.conf" = '''
; Unused — runtime uses /usr/sbin/php-fpm8.4 with /etc/php/8.4/fpm/
'''

"nginx.template.conf" = '''
user www-data www-data;
worker_processes auto;
daemon off;
pid /dev/null;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include $!{nginx}/conf/mime.types;
    index index.html index.htm index.php;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] $status '
                    '"$request" $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /dev/stdout main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 210M;

    server {
        listen ${PORT};
        listen [::]:${PORT};
        server_name _;

        $if(NIXPACKS_PHP_ROOT_DIR) (
            root ${NIXPACKS_PHP_ROOT_DIR};
        ) else (
            root /app/public;
        )

        add_header X-Content-Type-Options "nosniff";
        index index.php;
        charset utf-8;

        $if(NIXPACKS_PHP_FALLBACK_PATH) (
            location / {
                try_files $uri $uri/ ${NIXPACKS_PHP_FALLBACK_PATH}?$query_string;
            }
        ) else (
            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }
        )

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        $if(IS_LARAVEL) (
            error_page 404 /index.php;
        ) else ()

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include $!{nginx}/conf/fastcgi_params;
            include $!{nginx}/conf/fastcgi.conf;
            fastcgi_read_timeout 300;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
'''
